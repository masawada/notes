name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Clone Quartz v5
        run: git clone --depth 1 --branch v5 https://github.com/jackyzha0/quartz.git quartz-build

      - name: Cache dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: quartz-build/node_modules
          key: ${{ runner.os }}-quartz-${{ hashFiles('quartz-build/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-quartz-

      - name: Cache Quartz plugins
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: quartz-build/.quartz/plugins
          key: ${{ runner.os }}-plugins-${{ hashFiles('quartz-build/quartz.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-plugins-

      - name: Install dependencies
        run: cd quartz-build && npm ci

      - name: Install Quartz plugins
        run: cd quartz-build && npx quartz plugin install

      - name: Prepare content
        run: |
          rm -rf quartz-build/content/*
          cp pages/*.md quartz-build/content/ 2>/dev/null || true
          mkdir -p quartz-build/content/images
          cp images/*.* quartz-build/content/images/ 2>/dev/null || true
          cp .github/quartz/quartz.config.yaml quartz-build/quartz.config.yaml

      - name: Build
        run: cd quartz-build && npx quartz build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: quartz-build/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
